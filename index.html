<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Random Joke Generator</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #111827;
        --panel: #1f2937;
        --text: #f9fafb;
        --muted: #9ca3af;
        --accent: #f59e0b;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #111827, #1f2937);
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: min(100%, 640px);
        background: rgba(31, 41, 55, 0.95);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 20px;
        padding: 32px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.25);
      }

      h1 { margin: 0 0 12px; font-size: 2rem; }
      p { color: var(--muted); margin: 0 0 20px; }

      button {
        border: none;
        background: var(--accent);
        color: #111827;
        padding: 12px 18px;
        border-radius: 999px;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover { opacity: 0.95; }

      .joke-box {
        margin-top: 20px;
        padding: 18px;
        border-radius: 16px;
        background: rgba(255,255,255,0.05);
        min-height: 120px;
        display: flex;
        align-items: center;
        font-size: 1.1rem;
        line-height: 1.6;
      }

      .status {
        margin-top: 12px;
        color: var(--muted);
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Random Joke Generator</h1>
      <p>Get a fresh joke from an external API every time you click the button.</p>
      <button id="get-joke">Tell me a joke</button>
      <div id="joke" class="joke-box">Loading...</div>
      <div id="status" class="status"></div>
    </div>

    <script>
      const jokeEl = document.getElementById('joke');
      const statusEl = document.getElementById('status');
      const buttonEl = document.getElementById('get-joke');

      async function getJoke() {
        jokeEl.textContent = 'Loading...';
        statusEl.textContent = 'Fetching joke from API...';
        buttonEl.disabled = true;

        try {
          const response = await fetch('https://v2.jokeapi.dev/joke/Any?type=single');
          const data = await response.json();

          if (!response.ok || data.error) {
            throw new Error(data.message || 'Failed to fetch joke');
          }

          jokeEl.textContent = data.joke;
          statusEl.textContent = `Category: ${data.category}`;
        } catch (error) {
          jokeEl.textContent = 'Sorry, could not load a joke right now.';
          statusEl.textContent = error.message;
        } finally {
          buttonEl.disabled = false;
        }
      }

      buttonEl.addEventListener('click', getJoke);
      getJoke();
    </script>
  </body>
</html>
